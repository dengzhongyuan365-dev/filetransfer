  <rect width="1280" height="1080" fill="#f4f6fa"/>
  <text x="44" y="54" class="font title">传输卡片操作按钮视觉方案</text>
  <text x="44" y="84" class="font subtitle">目标：停止/继续、打开文件夹、清除三个动作必须有清楚的 normal、hover、pressed、disabled 状态，同时不破坏卡片紧凑感。</text>

  <g transform="translate(44 112)">
    <rect x="0" y="0" width="1192" height="52" rx="8" fill="#eef4ff" stroke="#d7e4ff"/>
    <text x="18" y="22" class="font note" font-weight="700" fill="#1d4ed8">阅读方式</text>
    <text x="18" y="40" class="font tiny">每个方案都是一组真实卡片预览。四列分别是 Normal、Hover、Pressed、Disabled。图标代表：停止/继续、打开目录、清除。</text>
  </g>

  <!-- Option A -->
  <g transform="translate(44 196)" class="shadow">
    <rect class="panel" x="0" y="0" width="1192" height="248" rx="10"/>
  </g>
  <text x="68" y="232" class="font section-title">方案 A：独立圆形按钮，低风险改造</text>
  <text x="68" y="256" class="font section-copy">保留当前卡片结构，增强颜色、边框、hover 浮起和 pressed 下沉。识别度够用，代码改动最小。</text>
  <rect x="1038" y="218" width="146" height="28" rx="14" fill="#e7f8ef" stroke="#b8e7cc"/>
  <text x="1064" y="237" class="font tiny" font-weight="700" fill="#087443">推荐：稳妥</text>

