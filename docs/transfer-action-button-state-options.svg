<svg width="1280" height="1080" viewBox="0 0 1280 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .font { font-family: Inter, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 28px; font-weight: 750; fill: #172033; }
      .subtitle { font-size: 14px; fill: #667085; }
      .section-title { font-size: 20px; font-weight: 750; fill: #172033; }
      .section-copy { font-size: 13px; fill: #667085; }
      .state-label { font-size: 12px; font-weight: 700; fill: #667085; }
      .card-title { font-size: 15px; font-weight: 750; fill: #172033; }
      .card-meta { font-size: 12px; fill: #667085; }
      .tiny { font-size: 11px; fill: #667085; }
      .note { font-size: 12px; fill: #475467; }
      .panel { fill: #ffffff; stroke: #dde4ee; stroke-width: 1; }
      .preview { fill: #ffffff; stroke: #dfe5ee; stroke-width: 1; }
      .rail { fill: #f6f8fb; stroke: #e3e9f2; stroke-width: 1; }
      .shadow { filter: url(#shadow); }
