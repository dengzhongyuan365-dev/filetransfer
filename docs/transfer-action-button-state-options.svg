    <filter id="buttonShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#101828" flood-opacity="0.16"/>
    </filter>

    <symbol id="icon-stop" viewBox="0 0 24 24">
      <rect x="7" y="7" width="10" height="10" rx="2"/>
    </symbol>
    <symbol id="icon-play" viewBox="0 0 24 24">
      <path d="M9 6 L18 12 L9 18 Z"/>
    </symbol>
    <symbol id="icon-folder" viewBox="0 0 24 24">
      <path d="M4 8 H10 L12 10 H20 V18 H4 Z"/>
    </symbol>
    <symbol id="icon-clear" viewBox="0 0 24 24">
      <path d="M8 8 L16 16 M16 8 L8 16" fill="none" stroke-width="2.2" stroke-linecap="round"/>
    </symbol>
