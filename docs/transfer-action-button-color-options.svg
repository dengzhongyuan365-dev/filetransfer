  <text x="44" y="54" class="font title">方案 A 颜色强化版本</text>
  <text x="44" y="84" class="font subtitle">形态不变：仍然是独立圆形图标按钮。这里专门比较颜色策略，让 normal / hover / pressed / disabled 更容易看出来。</text>

