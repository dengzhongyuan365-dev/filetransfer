    <rect class="panel" x="0" y="0" width="1192" height="250" rx="10"/>
  </g>
  <text x="68" y="154" class="font section-title">A1：轻量彩色，保持克制</text>
  <text x="68" y="178" class="font section-copy">优点是清爽；缺点是 normal 和 hover 差别仍然偏细。适合不想让按钮抢主内容的版本。</text>

